# =============================== Volantis 羊皮纸主题配置 ===============================

info:
  theme_name: Volantis - 羊皮纸风

# =============================== 默认占位图 ===============================
default:
  avatar: https://cdn.jsdelivr.net/gh/volantis-x/cdn-org/blog/favicon/apple-touch-icon.png
  cover: https://gcore.jsdelivr.net/gh/MHG-LAB/cron@gh-pages/bing/bing.jpg
  image: https://gcore.jsdelivr.net/gh/MHG-LAB/cron@gh-pages/bing/bing.jpg

# CSP
csp:
  enable: false

# =============================== 导航栏 ===============================
navbar:
  visiable: auto
  logo:
    img: false
    icon: fa-solid fa-feather-alt
    title: Kai Mao
  menu:
    - name: 首页
      icon: fa-solid fa-home
      url: /
    - name: 归档
      icon: fa-solid fa-archive
      url: archives/
    - name: 分类
      icon: fa-solid fa-folder-open
      url: categories/
    - name: 关于
      icon: fa-solid fa-user
      url: about/
    - name: 友链
      icon: fa-solid fa-link
      url: friends/
  search: 搜索文章...

# =============================== 封面 ===============================
cover:
  height_scheme: full
  layout_scheme: dock
  display:
    home: false
    archive: false
    others: false
  background: 
  title: Kai Mao
  subtitle: 书写代码，记录思考
  search: 探寻古老的知识...
  features:
    - name: 博客
      icon: fa-solid fa-book-open
      url: /archives/
    - name: 分类
      icon: fa-solid fa-folder-open
      url: /categories/
    - name: 关于
      icon: fa-solid fa-user
      url: /about/
    - name: GitHub
      icon: fab fa-github
      url: https://github.com/JackyMao1999

# =============================== 颜色方案 - 羊皮纸质感 ===============================
color_scheme:
  common:
    theme: '#8b3a3a'
    link: '#5a7a9a'
    button: '#8b3a3a'
    hover: '#a05040'
    inner: '#faf3e0'
    selection: 'alpha(#8b3a3a, 0.15)'
  light:
    site_bg: '#e8dcc8'
    site_inner: '#4a3520'
    site_footer: '#7a6a5a'
    card: '#faf3e0'
    text: '#3c2415'
    block: '#f0e6d0'
    codeblock: '#2c1e10'
    inlinecode: '#8b3a3a'
    h1: '#2c1810'
    h2: '#2c1810'
    h3: '#3c2415'
    h4: '#4a3520'
    h5: '#5a4a3a'
    h6: '#6a5a4a'
    p: '#3c2415'
    list: '#4a3520'
    list_hl: '#8b3a3a'
    meta: '#7a6a5a'
    copyright_bkg: '#f0e6d0'
  dark:
    site_bd: '#1a1410'
    site_bg: '#2c2418'
    card: '#3c3020'
    site_inner: '#e8dcc8'
    site_footer: '#8a7a6a'
    text: '#d8ccb8'
    block: '#4a3a28'
    codeblock: '#1a1410'
    inlinecode: '#c07050'
    h1: '#f0e6d0'
    h2: '#f0e6d0'
    h3: '#e8dcc8'
    h4: '#d8ccb8'
    h5: '#b8a890'
    h6: '#8a7a6a'
    p: '#d8ccb8'
    list: '#c8bca8'
    list_hl: '#c07050'
    meta: '#9a8a7a'
    copyright_bkg: '#3c3020'
    brightness: 90%

# =============================== 自定义样式 ===============================
custom_css:
  cursor:
    enable: false
  font_smoothing: true
  max_width: 1100px
  scrollbar:
    size: 6px
    border: 2px
    background: '#d4c4a8 linear-gradient(45deg, rgba(139, 58, 58, 0.15) 25%, transparent 25%, transparent 50%, rgba(139, 58, 58, 0.15) 50%, rgba(139, 58, 58, 0.15) 75%, transparent 75%, transparent)'
    hover_background: '#c8b898 linear-gradient(45deg, rgba(139, 58, 58, 0.25) 25%, transparent 25%, transparent 50%, rgba(139, 58, 58, 0.25) 50%, rgba(139, 58, 58, 0.25) 75%, transparent 75%, transparent)'
  navbar:
    height: 64px
    width: max
    effect: [shadow, floatable]
  sidebar:
    effect: [shadow, floatable]
  body:
    effect: [shadow, floatable]
    text_align:
      h1: left
      h2: left
      h3: left
      h4: left
      p: justify
  border_radius:
    card: 2px
    codeblock: 0px
    searchbar: 2px
    button: 2px
  fontfamily:
    logofont:
      fontfamily: '"Cormorant Garamond", "PingFang SC", "Microsoft YaHei", serif'
    bodyfont:
      fontfamily: '"Cormorant Garamond", "PingFang SC", "Microsoft YaHei", serif'
    codefont:
      fontfamily: '"Fira Code", Menlo, Monaco, Consolas, monospace'

# =============================== 侧边栏 ===============================
sidebar:
  position: right
  for_page: [blogger, category, tagcloud]
  for_post: [toc]
  widget_library:
    blogger:
      class: blogger
      display: [desktop, mobile]
      avatar: https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f9d9.png
      shape: circle
      url: /about/
      title: Kai Mao
      subtitle: 书写者 · 思考者
      jinrishici: 纸上得来终觉浅
      social:
        - icon: fab fa-github
          url: https://github.com/JackyMao1999
        - icon: fa-solid fa-envelope
          url: mailto:837002144@qq.com
        - icon: fa-solid fa-rss
          url: /atom.xml
    toc:
      class: toc
      display: [desktop, mobile]
      sticky: true
      header:
        icon: fa-solid fa-list
        title: 本文目录
      list_number: false
      min_depth: 2
      max_depth: 5
    category:
      class: category
      display: [desktop]
      header:
        icon: fa-solid fa-folder-open
        title: 文章分类
        url: /categories/
    tagcloud:
      class: tagcloud
      display: [desktop, mobile]
      header:
        icon: fa-solid fa-tags
        title: 热门标签
        url: /tags/
      min_font: 14
      max_font: 24
      color: true
      start_color: '#8b3a3a'
      end_color: '#5a7a9a'

# =============================== 文章布局 ===============================
article:
  preview:
    scheme: landscape
    pin_icon: fa-solid fa-thumbtack
    auto_title: true
    auto_excerpt: true
    readmore: auto
  body:
    top_meta: [author, category, date, counter]
    bottom_meta: [updated, tags]
    footer_widget:
      copyright:
        enable: false
      donate:
        enable: false
    meta_library:
      author:
        avatar: https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f9d9.png
        name: Kai Mao
        url: /about/

# =============================== 页面 ===============================
pages:
  friends:
    layout_scheme: traditional

# =============================== 评论 ===============================
comments:
  title: <i class='fa-solid fa-comments'></i> 留下你的想法
  service:

# =============================== 页脚 ===============================
site_footer:
  layout: [social, info, copyright]
  social:
    - icon: fab fa-github
      url: https://github.com/JackyMao1999
  copyright: '[Copyright © 2026 JackyMao](/)'
  br: '<br>'

# =============================== 插件 ===============================
plugins:
  preload:
    enable: true
    service: flying_pages
  lazyload:
    enable: true
    onlypost: false
    blurIn: true
  code_highlight: highlightjs
  highlightjs:
    copy_code: true
  pjax:
    enable: true
    cover: true
    timeout: 5000
    animation: nprogress

# =============================== 搜索 ===============================
search:
  enable: true
  service: hexo
