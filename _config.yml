# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: JackyMao's Page
subtitle: 锡城小凯的博客
description: JackyMao's Page - 代码与魔法的交汇处
keywords: Python, JavaScript, Blog, 编程, 技术
author: JackyMao
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://jackymao.vercel.app/
permalink: :year/:month/:day/:title/
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

# Highlight - disabled (handled by Volantis theme)
syntax_highlighter: ''
highlight:
  enable: false
prismjs:
  enable: false

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: volantis

# Deployment
deploy:
  type: ''
